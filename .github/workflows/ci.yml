name: CI
on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - "**"
jobs:
    build-and-test:
        runs-on: localdev-root-
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                clean: true
            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: '8.0.x'
            - name: Restore dependencies
              run: dotnet restore
            - name: Build
              run: dotnet build --no-restore
            - name: Test
              run: dotnet test --no-build --verbosity normal
